<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Special Surprise Is Waiting</title>
  <style>
    :root {
      --bg-one: #050612;
      --bg-two: #170a22;
      --bg-three: #311227;
      --text: #fff7fb;
      --muted: #d8c4d2;
      --pink: #ff6fae;
      --rose: #ff9abf;
      --gold: #f8d77b;
      --glass: rgba(255, 255, 255, .09);
      --line: rgba(255, 255, 255, .18);
      --shadow: 0 34px 110px rgba(0, 0, 0, .48);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 111, 174, .2), transparent 22rem),
        radial-gradient(circle at 82% 76%, rgba(248, 215, 123, .12), transparent 24rem),
        linear-gradient(135deg, var(--bg-one), var(--bg-two) 48%, var(--bg-three));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .025) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
    }

    .countdown-page {
      position: relative;
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: clamp(20px, 5vw, 64px);
      isolation: isolate;
    }

    .particles,
    .hearts {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(248, 215, 123, .9);
      box-shadow: 0 0 20px rgba(248, 215, 123, .75);
      animation: driftParticle var(--duration) ease-in-out infinite;
      opacity: .72;
    }

    .heart {
      position: absolute;
      color: rgba(255, 154, 191, .72);
      font-size: var(--size);
      text-shadow: 0 0 24px rgba(255, 111, 174, .5);
      animation: floatHeart var(--duration) linear infinite;
    }

    .card {
      width: min(960px, 100%);
      padding: clamp(26px, 6vw, 68px);
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .14), rgba(255, 255, 255, .045));
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, .18);
      backdrop-filter: blur(24px);
      text-align: center;
      animation: fadeUp .9s ease both;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: clamp(.72rem, 1.6vw, .82rem);
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.1rem, 6vw, 5.4rem);
      line-height: 1.05;
      text-wrap: balance;
      text-shadow: 0 0 34px rgba(255, 111, 174, .22);
    }

    .subcopy {
      max-width: 620px;
      margin: 18px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      line-height: 1.7;
    }

    .unlock-label {
      margin: clamp(26px, 5vw, 44px) 0 18px;
      color: #ffe7f0;
      font-weight: 800;
      letter-spacing: .03em;
    }

    .timer {
      display: grid;
      grid-template-columns: repeat(4, minmax(112px, 1fr));
      gap: clamp(12px, 2vw, 18px);
      margin: 0 auto;
    }

    .time-box {
      min-height: 128px;
      display: grid;
      place-items: center;
      padding: 18px 10px;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 14px;
      background: rgba(5, 6, 18, .42);
      box-shadow: inset 0 0 32px rgba(255, 111, 174, .08);
    }

    .time-value {
      display: block;
      color: #fff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.1rem, 6vw, 4.7rem);
      line-height: 1;
    }

    .time-label {
      display: block;
      margin-top: 10px;
      color: var(--rose);
      font-size: .78rem;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .note {
      margin: 24px auto 0;
      color: rgba(255, 247, 251, .78);
      font-size: .95rem;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px) scale(.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes driftParticle {
      50% {
        transform: translate3d(18px, -28px, 0) scale(1.55);
        opacity: 1;
      }
    }

    @keyframes floatHeart {
      from {
        transform: translate3d(0, 110vh, 0) rotate(0deg);
        opacity: 0;
      }
      12% {
        opacity: .85;
      }
      to {
        transform: translate3d(var(--sway), -16vh, 0) rotate(24deg);
        opacity: 0;
      }
    }

    @media (max-width: 760px) {
      html,
      body {
        overflow: auto;
      }

      .timer {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .time-box {
        min-height: 108px;
      }
    }

    @media (max-width: 430px) {
      .countdown-page {
        padding: 16px;
      }

      .card {
        border-radius: 14px;
      }

      .timer {
        gap: 10px;
      }

      .time-label {
        font-size: .67rem;
        letter-spacing: .12em;
      }
    }
  </style>
</head>
<body>
  <main class="countdown-page" aria-label="Countdown landing page">
    <div class="particles" id="particles" aria-hidden="true"></div>
    <div class="hearts" id="hearts" aria-hidden="true"></div>

    <section class="card">
      <p class="eyebrow">A secret moment is almost here</p>
      <h1>A Special Surprise Is Waiting For You ❤️</h1>
      <p class="subcopy">Please come back at the right time.</p>
      <p class="unlock-label">Your surprise will unlock in...</p>

      <div class="timer" aria-live="polite">
        <div class="time-box">
          <span id="days" class="time-value">00</span>
          <span class="time-label">Days</span>
        </div>
        <div class="time-box">
          <span id="hours" class="time-value">00</span>
          <span class="time-label">Hours</span>
        </div>
        <div class="time-box">
          <span id="minutes" class="time-value">00</span>
          <span class="time-label">Minutes</span>
        </div>
        <div class="time-box">
          <span id="seconds" class="time-value">00</span>
          <span class="time-label">Seconds</span>
        </div>
      </div>

      <p class="note">Days : Hours : Minutes : Seconds</p>
    </section>
  </main>

  <script>
    // Change this one value whenever you want to update the unlock time.
    // Use your local time zone format: YYYY-MM-DDTHH:mm:ss+05:30
    const UNLOCK_TIME = "2026-07-10T07:30:00+05:30";
    const REDIRECT_URL = "/main.html";

    const unlockDate = new Date(UNLOCK_TIME).getTime();
    const timeParts = {
      days: document.querySelector("#days"),
      hours: document.querySelector("#hours"),
      minutes: document.querySelector("#minutes"),
      seconds: document.querySelector("#seconds")
    };

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function redirectToMain() {
      window.location.replace(REDIRECT_URL);
    }

    function updateCountdown() {
      const remaining = unlockDate - Date.now();

      if (remaining <= 0) {
        timeParts.days.textContent = "00";
        timeParts.hours.textContent = "00";
        timeParts.minutes.textContent = "00";
        timeParts.seconds.textContent = "00";
        redirectToMain();
        return;
      }

      const totalSeconds = Math.floor(remaining / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      timeParts.days.textContent = pad(days);
      timeParts.hours.textContent = pad(hours);
      timeParts.minutes.textContent = pad(minutes);
      timeParts.seconds.textContent = pad(seconds);
    }

    function createParticles() {
      const particles = document.querySelector("#particles");
      const hearts = document.querySelector("#hearts");

      for (let index = 0; index < 42; index += 1) {
        const particle = document.createElement("span");
        particle.className = "particle";
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.top = `${Math.random() * 100}%`;
        particle.style.setProperty("--duration", `${3 + Math.random() * 4}s`);
        particles.appendChild(particle);
      }

      for (let index = 0; index < 18; index += 1) {
        const heart = document.createElement("span");
        heart.className = "heart";
        heart.textContent = "❤";
        heart.style.left = `${Math.random() * 100}%`;
        heart.style.setProperty("--size", `${15 + Math.random() * 24}px`);
        heart.style.setProperty("--sway", `${-50 + Math.random() * 100}px`);
        heart.style.setProperty("--duration", `${8 + Math.random() * 8}s`);
        heart.style.animationDelay = `${Math.random() * -12}s`;
        hearts.appendChild(heart);
      }
    }

    if (Date.now() >= unlockDate) {
      redirectToMain();
    } else {
      createParticles();
      updateCountdown();
      setInterval(updateCountdown, 1000);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

<h1>Login</h1>

<form action="/auth/login" method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <br><br>

    <button type="submit">

        Login ❤️

    </button>

</form>

<hr>

<h3>Create Account</h3>

<form action="/auth/register" method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <br><br>

    <button type="submit">

        Register

    </button>

</form>

</div>

</body>

</html>
